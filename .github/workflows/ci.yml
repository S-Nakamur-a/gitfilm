name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: gofmt
        run: make fmt-check

      - name: go vet
        run: make vet

      - name: go test
        run: make test

      - name: go build
        run: make build
