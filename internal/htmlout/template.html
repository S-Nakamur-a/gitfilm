<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>gitfilm — {{.Branch}}</title>
<style>
  :root {
    --bg: #0e1116;
    --fg: #e6edf3;
    --dim: #7d8590;
    --add: #56d364;
    --del: #f85149;
    --feat: #d2a8ff;
    --against: #79c0ff;
    --new: #f0c674;
    --panel: #161b22;
  }
  body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--fg);
    font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  header {
    padding: 10px 16px; border-bottom: 1px solid #21262d;
    display: flex; gap: 16px; align-items: baseline; flex-wrap: wrap;
  }
  header h1 { font-size: 14px; margin: 0; color: var(--feat); }
  header .meta { color: var(--dim); }
  main { display: grid; grid-template-columns: 360px 1fr; gap: 12px; padding: 12px; }
  .panel { background: var(--panel); border: 1px solid #21262d; border-radius: 6px; padding: 12px; min-height: 60vh; max-height: calc(100vh - 180px); overflow-y: auto; }
  .tree { font-size: 12px; }
  .tree .row { white-space: nowrap; display: flex; align-items: center; gap: 6px; }
  .tree .name { flex: 1; overflow: hidden; text-overflow: ellipsis; }
  .tree .heat { width: 60px; height: 8px; background: #30363d; border-radius: 2px; overflow: hidden; }
  .tree .heat span { display: block; height: 100%; background: var(--against); }
  .tree .deleted { color: var(--dim); text-decoration: line-through; }
  .tree .new { color: var(--new); }
  .tree .faint { color: var(--dim); opacity: 0.55; }
  .commit-card { background: #0d1117; border: 1px solid #21262d; border-radius: 6px; padding: 8px 12px; margin-bottom: 12px; }
  .commit-subject { font-size: 14px; color: var(--fg); margin: 0 0 4px; }
  .commit-author { color: var(--dim); font-size: 12px; }
  .commit-body { color: var(--dim); white-space: pre-wrap; font-size: 12px; margin-top: 6px; max-height: 64px; overflow-y: auto; }
  .files { display: grid; gap: 8px; }
  .file-card { background: #0d1117; border: 1px solid #21262d; border-radius: 4px; padding: 6px 10px; }
  .file-card .file-head { display: flex; gap: 8px; align-items: center; }
  .file-card .file-head .stats { color: var(--dim); margin-left: auto; }
  .file-card.done { opacity: 0.6; }
  .file-card.done .file-head .check { color: var(--add); }
  .file-card .progress { height: 2px; background: #21262d; border-radius: 1px; margin-top: 4px; overflow: hidden; }
  .file-card .progress span { display: block; height: 100%; background: var(--new); transition: width 80ms linear; }
  .file-card.done .progress span { background: var(--add); }
  .hunk { padding: 4px 0 0; overflow-x: auto; }
  .hunk .l { white-space: pre; font-size: 12px; }
  .hunk .l.add { color: var(--add); }
  .hunk .l.del { color: var(--del); }
  .hunk .l.ctx { color: var(--dim); }
  .caret { display: inline-block; width: 6px; background: var(--new); animation: blink 0.7s steps(2) infinite; }
  @keyframes blink { to { background: transparent; } }
  footer {
    position: sticky; bottom: 0; background: var(--bg);
    border-top: 1px solid #21262d; padding: 8px 16px;
  }
  .commit-progress {
    height: 3px; background: #21262d; border-radius: 2px;
    margin-bottom: 6px; overflow: hidden;
  }
  .commit-progress span {
    display: block; height: 100%; background: var(--new);
    box-shadow: 0 0 6px var(--new);
    transition: width 80ms linear;
  }
  .commit-progress.paused span { background: var(--dim); box-shadow: none; }
  .timeline-wrap { position: relative; height: 18px; }
  .timeline {
    display: flex; height: 12px; border-radius: 2px; overflow: hidden;
    position: absolute; left: 0; right: 0; top: 0;
    background: #181d24; /* baseline so quiet stretches still read as a strip */
  }
  .timeline span.seg { display: block; height: 100%; flex-shrink: 0; }
  .timeline span.seg.feat { background: var(--feat); }
  .timeline span.seg.against { background: var(--against); }
  .timeline span.seg.empty { background: transparent; }
  .timeline-caret {
    position: absolute; top: 0; width: 2px; height: 18px;
    background: var(--new); transition: left 80ms linear;
    box-shadow: 0 0 6px var(--new);
  }
  .timeline-caret::after {
    content: '▼'; position: absolute; top: -10px; left: -5px;
    font-size: 10px; color: var(--new);
  }
  .controls { display: flex; gap: 8px; align-items: center; margin-top: 6px; color: var(--dim); }
  .controls button { background: #21262d; color: var(--fg); border: 0; padding: 4px 10px; border-radius: 3px; cursor: pointer; }
  .controls input[type=range] { flex: 1; }
  .badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 11px; }
  .badge.feat { background: rgba(210,168,255,.15); color: var(--feat); }
  .badge.against { background: rgba(121,192,255,.15); color: var(--against); }
  /* Author chip: per-author stable hue from the Go palette. The
     background is the same hue at low alpha so the chip reads as a
     character tag, distinct from feat/against tag chips. */
  .author-chip { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 12px; font-weight: 600; }
  /* Gap-banner styles. Hint: inline dim subtitle. Banner: a full-
     width "scene break" rule above the subject. */
  .gap-hint { color: var(--new); margin-left: 8px; font-size: 11px; }
  .gap-banner { display: flex; align-items: center; gap: 8px; color: var(--new);
    margin-bottom: 8px; font-size: 12px; letter-spacing: 0.5px; text-transform: uppercase; }
  .gap-banner::before, .gap-banner::after { content: ''; flex: 1; height: 1px;
    background: linear-gradient(to right, transparent, var(--new), transparent); opacity: 0.55; }
  /* Running-counters HUD between the timeline and the controls. */
  .hud { display: flex; gap: 14px; align-items: baseline; color: var(--dim);
    font-size: 11px; margin-top: 6px; flex-wrap: wrap; }
  .hud .add { color: var(--add); font-weight: 600; }
  .hud .del { color: var(--del); font-weight: 600; }
  .hud .files { color: var(--new); font-weight: 600; }
  .hud .span { color: var(--dim); }
</style>
</head>
<body>
<div id="loading" style="position:fixed;inset:0;background:#0d1117;color:#c9d1d9;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;z-index:9999;font:14px/1.4 system-ui;">
  <div style="font-size:18px;">gitfilm</div>
  <div id="loading-status">Loading commit data…</div>
  <div id="loading-hint" style="font-size:11px;color:#8b949e;">commit details load progressively as you scrub</div>
</div>
<header>
  <h1>gitfilm</h1>
  <span class="meta"><strong id="branch"></strong> ⇒ <span id="against"></span></span>
</header>
<main>
  <section class="panel tree" id="tree-panel"></section>
  <section class="panel right">
    <div class="gap-banner" id="gap-banner" style="display:none"><span id="gap-banner-text"></span></div>
    <div class="commit-card">
      <h2 class="commit-subject" id="commit-subject"></h2>
      <div class="commit-author" id="commit-author"></div>
      <div class="commit-body" id="commit-body"></div>
    </div>
    <div class="files" id="files"></div>
  </section>
</main>
<footer>
  <div class="commit-progress" id="commit-progress"><span style="width:0%"></span></div>
  <div class="timeline-wrap">
    <div class="timeline" id="timeline"></div>
    <div class="timeline-caret" id="caret"></div>
  </div>
  <div class="hud" id="hud" aria-live="polite">
    <span class="add" id="hud-added">+0</span>
    <span class="del" id="hud-removed">-0</span>
    <span class="files" id="hud-files">0 files</span>
    <span class="span" id="hud-span"></span>
  </div>
  <div class="controls">
    <button id="play">▶</button>
    <button id="prev">◀</button>
    <button id="next">▶|</button>
    <input type="range" id="scrubber" min="0" max="0" value="0" />
    <span id="counter"></span>
  </div>
</footer>

<script id="data" type="application/json">{{.Data}}</script>
<!--GITFILM_CHUNKS-->
<script>
// Two-phase boot: paint the loading overlay first, then yield to the
// renderer so the browser can show it before we synchronously block on
// JSON.parse (which can take seconds on >100MB payloads). Without the
// double-rAF the parse starts on the same frame and the user sees a
// frozen white page.
function bootGitfilm() {
  const status = document.getElementById('loading-status');
  function setStatus(msg) {
    if (status) status.textContent = msg;
  }

  setStatus('Reading payload…');
  const raw = document.getElementById('data').textContent;
  setStatus('Parsing ' + (raw.length / 1024 / 1024).toFixed(1) + ' MB JSON…');

  // setTimeout 0 lets the status repaint before JSON.parse blocks.
  setTimeout(function () {
    const tParse = performance.now();
    const data = JSON.parse(raw);
    const dt = performance.now() - tParse;
    setStatus('Parsed in ' + dt.toFixed(0) + 'ms — initializing…');
    // Free the source string so the browser can GC the original ~Nx MB.
    document.getElementById('data').textContent = '';
    setTimeout(function () { runGitfilm(data); }, 0);
  }, 0);
}

function runGitfilm(data) {
  // The eager payload only carries lightweight per-commit summaries.
  // Heavy fields (files / snapshot / body) live in <script id="chunk-N">
  // tags and are JSON.parse'd on demand by detailAt(i). This keeps the
  // initial parse bounded by O(commits) summary bytes rather than
  // O(commits) × diff-text bytes.
  const summaries = data.summaries || [];
  const commitCount = data.commit_count || summaries.length;
  const chunkSize = data.chunk_size || 100;
  document.getElementById('branch').textContent = data.branch || '';
  document.getElementById('against').textContent = data.against || '';

  // detailCache holds parsed chunks keyed by chunk index. The Map's
  // insertion-order iteration gives us a cheap LRU: refresh on hit by
  // delete+re-set, evict the oldest when over the limit.
  const detailCache = new Map();
  const detailCacheLimit = 4; // ~400 commits worth of detail kept hot
  function detailAt(i) {
    if (i < 0 || i >= commitCount) return null;
    const ci = Math.floor(i / chunkSize);
    const cached = detailCache.get(ci);
    if (cached) {
      detailCache.delete(ci);
      detailCache.set(ci, cached);
      return cached[i - ci * chunkSize] || null;
    }
    const tag = document.getElementById('chunk-' + ci);
    if (!tag) return null;
    const text = tag.textContent;
    let parsed;
    try {
      parsed = JSON.parse(text);
    } catch (err) {
      console.error('failed to parse chunk', ci, err);
      parsed = [];
    }
    // Drop the source string so the browser can GC the textContent.
    tag.textContent = '';
    detailCache.set(ci, parsed);
    if (detailCache.size > detailCacheLimit) {
      const oldest = detailCache.keys().next().value;
      detailCache.delete(oldest);
    }
    return parsed[i - ci * chunkSize] || null;
  }

  // commitAt merges the eager summary with the lazily-loaded detail
  // for full-commit access. Use this only when you actually need
  // files/snapshot/body — for tag/dwell/subject the summary suffices.
  const emptyDetail = { body: '', files: [], snapshot: { paths: [], heat: [], touches: [], ghosts: [], added: [] } };
  function commitAt(i) {
    const s = summaries[i] || {};
    const d = detailAt(i) || emptyDetail;
    return {
      hash: s.hash, short: s.short, author_name: s.author_name,
      when: s.when, when_unix: s.when_unix, subject: s.subject,
      tag: s.tag, dwell_ms: s.dwell_ms, max_budget: s.max_budget,
      body: d.body || '',
      files: d.files || [],
      snapshot: d.snapshot || emptyDetail.snapshot,
    };
  }

  // ---- DOM helpers (no innerHTML; builds elements via textContent) ----
  function el(tag, attrs, children) {
    const n = document.createElement(tag);
    if (attrs) {
      for (const k in attrs) {
        if (k === 'class') n.className = attrs[k];
        else if (k === 'style') n.setAttribute('style', attrs[k]);
        else n.setAttribute(k, attrs[k]);
      }
    }
    if (children != null) {
      const arr = Array.isArray(children) ? children : [children];
      for (const c of arr) {
        if (c == null) continue;
        if (typeof c === 'string') n.appendChild(document.createTextNode(c));
        else n.appendChild(c);
      }
    }
    return n;
  }
  function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }

  let idx = 0;
  let playing = true;
  let progress = 0; // 0..1 within current commit
  // Tuning values come from the Go side (internal/replay) so heat
  // decay, hidden/faint thresholds, and animation pacing stay in sync
  // between the TUI and HTML renderers.
  const T = data.tuning || {};
  const VISIBLE_LINES = T.visible_lines || 6;
  const LINE_COST = T.line_cost || 4;
  const MIN_FILE_BUDGET = T.min_file_budget || 8;
  const HIDDEN_BELOW = T.hidden_below || 0.005;
  const FAINT_BELOW = T.faint_below || 0.05;
  // Optional "movie decoder" typing effect. When SCRAMBLE is true,
  // characters past the typing cursor render as flickering noise
  // drawn from SCRAMBLE_CHARSET. The shimmer is driven by
  // SCRAMBLE_SEED, which ticks every SCRAMBLE_TICK_MS regardless of
  // playback so the effect reads as live decoding.
  const SCRAMBLE = !!T.scramble;
  const SCRAMBLE_AHEAD = T.scramble_ahead || 6;
  const SCRAMBLE_CHARSET = T.scramble_charset
    || 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*+=<>?/|{}[]~';
  const SCRAMBLE_TICK_MS = 80;
  const WORD_RE = /[A-Za-z0-9_]/;
  function scrambleLine(text, chars, seed) {
    if (!SCRAMBLE) return text.slice(0, chars);
    if (chars >= text.length) return text;
    if (chars < 0) chars = 0;
    let stop = chars;
    if (chars > 0) {
      // Token-boundary round-forward: mirror replay.PartialLine so
      // identifiers don't tear mid-word as the cursor advances. We
      // peek up to two runes ahead.
      for (let i = chars; i < text.length && i < chars + 2; i++) {
        if (!WORD_RE.test(text[i - 1])) break;
        if (!WORD_RE.test(text[i])) { stop = i; break; }
      }
      if (stop > text.length) stop = text.length;
    }
    const end = Math.min(text.length, stop + SCRAMBLE_AHEAD);
    let out = text.slice(0, stop);
    const pool = SCRAMBLE_CHARSET;
    for (let i = stop; i < end; i++) {
      // Cheap 32-bit mixer keyed by (seed, position). Lower bits of
      // a multiply-add aren't great so we shift before %.
      let s = ((seed | 0) * 374761393 + i * 668265263) | 0;
      s = (s ^ (s >>> 13)) | 0;
      s = (s * 1274126177) | 0;
      s = (s ^ (s >>> 16)) >>> 0;
      out += pool[s % pool.length];
    }
    return out;
  }

  // Per-frame heat snapshots are reconstituted into Maps/Sets lazily.
  // Source data lives in the per-commit detail (chunk-loaded), so this
  // also implicitly forces the chunk to be parsed. A small LRU keeps
  // recently-rendered frames hot during scrubs.
  const snapshotCache = new Map();
  const snapshotCacheLimit = 16;
  function snapshotAt(i) {
    const hit = snapshotCache.get(i);
    if (hit !== undefined) {
      snapshotCache.delete(i);
      snapshotCache.set(i, hit);
      return hit;
    }
    const d = detailAt(i) || emptyDetail;
    const s = d.snapshot || emptyDetail.snapshot;
    const heat = new Map();
    const touches = new Map();
    for (let j = 0; j < s.paths.length; j++) {
      heat.set(s.paths[j], s.heat[j]);
      touches.set(s.paths[j], s.touches[j]);
    }
    const snap = { heat, touches, ghosts: new Set(s.ghosts), added: new Set(s.added) };
    snapshotCache.set(i, snap);
    if (snapshotCache.size > snapshotCacheLimit) {
      const oldest = snapshotCache.keys().next().value;
      snapshotCache.delete(oldest);
    }
    return snap;
  }

  function heatColor(t) {
    if (t < 0.25) return 'var(--against)';
    if (t < 0.5) return '#f1e05a';
    if (t < 0.75) return '#f0c674';
    return 'var(--del)';
  }

  function renderTree(snap) {
    const panel = document.getElementById('tree-panel');
    clear(panel);
    const max = Math.max(0.0001, ...Array.from(snap.heat.values()));
    const root = { children: new Map(), files: [] };
    function ensure(parts) {
      let cur = root;
      for (const p of parts) {
        if (!cur.children.has(p)) cur.children.set(p, { children: new Map(), files: [] });
        cur = cur.children.get(p);
      }
      return cur;
    }
    const allPaths = new Set([...snap.heat.keys(), ...snap.ghosts]);
    for (const path of allPaths) {
      const parts = path.split('/');
      const dir = ensure(parts.slice(0, -1));
      if (snap.ghosts.has(path) && !snap.heat.has(path)) {
        dir.files.push({ name: parts[parts.length - 1], path, deleted: true });
        continue;
      }
      const heat = snap.heat.get(path) || 0;
      const ratio = heat / max;
      if (ratio < HIDDEN_BELOW) continue;
      dir.files.push({
        name: parts[parts.length - 1],
        path,
        heat,
        ratio,
        faint: ratio < FAINT_BELOW,
        touches: snap.touches.get(path) || 0,
        isNew: snap.added.has(path),
        deleted: false,
      });
    }
    // Recursively count visible descendants so we can prune empty dirs.
    function visibleCount(node) {
      let n = node.files.length;
      for (const sub of node.children.values()) n += visibleCount(sub);
      return n;
    }
    function walk(node, depth) {
      const dirs = Array.from(node.children.entries()).sort();
      for (const [name, sub] of dirs) {
        if (visibleCount(sub) === 0) continue;
        panel.appendChild(el('div', { class: 'row', style: 'padding-left:' + (depth * 12) + 'px' },
          el('span', { class: 'name' }, name + '/')));
        walk(sub, depth + 1);
      }
      const files = node.files.sort((a, b) => a.name.localeCompare(b.name));
      for (const f of files) {
        const cls = 'row ' + (f.deleted ? 'deleted' : (f.faint ? 'faint' : (f.isNew ? 'new' : '')));
        const marker = f.deleted ? '👻 ' : (f.isNew ? '✨ ' : '');
        const padding = 'padding-left:' + (depth * 12) + 'px';
        if (f.deleted || f.faint) {
          panel.appendChild(el('div', { class: cls, style: padding },
            el('span', { class: 'name' }, marker + f.name)));
          continue;
        }
        const heatPct = Math.round(f.ratio * 100);
        const heatBar = el('span', { class: 'heat' },
          el('span', { style: 'width:' + heatPct + '%; background:' + heatColor(f.ratio) }));
        const touches = el('span', { style: 'color:var(--dim); width:30px; text-align:right' }, '×' + (f.touches || 0));
        panel.appendChild(el('div', { class: cls, style: padding }, [
          el('span', { class: 'name' }, marker + f.name),
          heatBar,
          touches,
        ]));
      }
    }
    walk(root, 0);
  }

  // Prefix sums of added/removed across summaries so the HUD can read
  // cumulative totals up to idx in O(1). Built once at boot — costs
  // O(N) at startup, beats O(idx) on every redraw during scrubbing.
  // cumFiles is null until first read; populated lazily because the
  // unique-paths set requires per-frame snapshot data which is
  // chunk-loaded.
  const cumAdded = new Int32Array(commitCount + 1);
  const cumRemoved = new Int32Array(commitCount + 1);
  for (let i = 0; i < commitCount; i++) {
    const s = summaries[i] || {};
    cumAdded[i + 1] = cumAdded[i] + (s.added | 0);
    cumRemoved[i + 1] = cumRemoved[i] + (s.removed | 0);
  }

  // Time bounds for time-based timeline placement. Computed once from
  // summaries; degenerate histories (single instant) fall back to even
  // spacing via the timelineFrac() guards below.
  const tBounds = (function () {
    let lo = Infinity, hi = -Infinity;
    for (const s of summaries) {
      const u = s.when_unix || 0;
      if (u < lo) lo = u;
      if (u > hi) hi = u;
    }
    if (!isFinite(lo) || !isFinite(hi)) { lo = 0; hi = 0; }
    return { lo, hi };
  })();

  function timelineFrac(i) {
    if (commitCount <= 1) return 0;
    if (tBounds.hi <= tBounds.lo) return i / (commitCount - 1);
    const u = (summaries[i] && summaries[i].when_unix) || tBounds.lo;
    return (u - tBounds.lo) / (tBounds.hi - tBounds.lo);
  }

  // renderTimeline draws a strip whose horizontal axis is wall-clock
  // time. Each cell covers a fixed time slice, density (commit count)
  // is encoded as opacity, dominant branch tag as color. Empty cells
  // (long quiet periods) read as gaps in the strip.
  const TIMELINE_BINS = 200;
  function renderTimeline() {
    const tl = document.getElementById('timeline');
    clear(tl);
    document.getElementById('scrubber').max = String(Math.max(0, commitCount - 1));
    if (!commitCount) return;

    const W = TIMELINE_BINS;
    const cells = new Array(W);
    for (let i = 0; i < W; i++) cells[i] = { count: 0, feat: 0, against: 0, other: 0 };

    const span = tBounds.hi - tBounds.lo;
    for (let i = 0; i < commitCount; i++) {
      const s = summaries[i] || {};
      let bin;
      if (span <= 0) {
        bin = W - 1;
      } else {
        bin = Math.floor(((s.when_unix || tBounds.lo) - tBounds.lo) * W / span);
        if (bin >= W) bin = W - 1;
        if (bin < 0) bin = 0;
      }
      cells[bin].count++;
      if (s.tag === 'feat') cells[bin].feat++;
      else if (s.tag === 'against') cells[bin].against++;
      else cells[bin].other++;
    }

    let maxCount = 0;
    for (const c of cells) if (c.count > maxCount) maxCount = c.count;

    const cellW = (100 / W).toFixed(4) + '%';
    for (const c of cells) {
      let cls = 'seg empty';
      let style = 'width:' + cellW + ';';
      if (c.count > 0) {
        const tag = (c.feat >= c.against && c.feat >= c.other) ? 'feat'
          : (c.against >= c.other) ? 'against' : 'empty';
        cls = 'seg ' + tag;
        const density = maxCount > 0 ? c.count / maxCount : 0;
        // Floor opacity at 0.25 so a single-commit cell still reads,
        // but max density gets the tag color at full saturation.
        const opacity = 0.25 + 0.75 * density;
        style += 'opacity:' + opacity.toFixed(3) + ';';
      }
      tl.appendChild(el('span', { class: cls, style }));
    }
  }

  function updateCaret() {
    if (!commitCount) return;
    const pct = timelineFrac(idx) * 100;
    document.getElementById('caret').style.left = 'calc(' + pct + '% - 1px)';
  }

  function updateCommitProgress() {
    const wrap = document.getElementById('commit-progress');
    if (!wrap) return;
    const bar = wrap.firstElementChild;
    if (!bar) return;
    const pct = Math.max(0, Math.min(100, progress * 100));
    bar.style.width = pct.toFixed(2) + '%';
    if (playing) wrap.classList.remove('paused');
    else wrap.classList.add('paused');
  }

  // Per-file and per-commit budgets are precomputed in Go (under
  // FirstHunkProfile, mirroring exactly what this renderer shows). The
  // browser only advances the typing cursor; cost-of-line constants
  // (LINE_COST, VISIBLE_LINES) come from data.tuning so the algorithm
  // stays in lockstep with the Go side.
  function applyFileAnim(f, budget) {
    const hunks = f.hunks || [];
    if (!hunks.length) return { hi: 0, li: 0, chars: -1, done: true };
    if (budget <= 0) return { hi: 0, li: 0, chars: 0, done: false };
    const h = hunks[0];
    const n = Math.min(VISIBLE_LINES, h.lines.length);
    let rem = budget;
    for (let li = 0; li < n; li++) {
      const l = h.lines[li];
      if (l.k === '+') {
        const len = l.t.length;
        if (rem < len) return { hi: 0, li, chars: rem, done: false };
        rem -= len;
      } else {
        if (rem < LINE_COST) return { hi: 0, li, chars: 0, done: false };
        rem -= LINE_COST;
      }
    }
    return { hi: 0, li: 0, chars: -1, done: true };
  }

  function consumedFor(f, anim) {
    const budget = f.budget != null ? f.budget : MIN_FILE_BUDGET;
    const hunks = f.hunks || [];
    if (anim.done || !hunks.length) return budget;
    const h = hunks[0];
    const n = Math.min(VISIBLE_LINES, h.lines.length);
    let consumed = 0;
    for (let li = 0; li < n; li++) {
      if (li > anim.li) break;
      const l = h.lines[li];
      if (li === anim.li) {
        consumed += l.k === '+' ? anim.chars : 0;
        break;
      }
      consumed += l.k === '+' ? l.t.length : LINE_COST;
    }
    return consumed;
  }

  // relativeAge formats a unix timestamp as "5 days ago", "2 years ago",
  // etc. Picks the largest unit that yields >= 1, with no decimals so
  // it stays glanceable. Falls back to "" if when_unix is missing.
  function relativeAge(unix) {
    if (!unix) return '';
    const diffMs = Date.now() - unix * 1000;
    const sec = Math.round(diffMs / 1000);
    if (sec < 0) return 'in the future';
    const units = [
      [60, 'second'],
      [60, 'minute'],
      [24, 'hour'],
      [7, 'day'],
      [4.345, 'week'],
      [12, 'month'],
      [Number.POSITIVE_INFINITY, 'year'],
    ];
    let n = sec;
    for (let i = 0; i < units.length; i++) {
      const [factor, label] = units[i];
      if (n < factor) return n + ' ' + label + (n === 1 ? '' : 's') + ' ago';
      n = Math.floor(n / factor);
    }
    return n + ' years ago';
  }

  function renderCommitMeta(c) {
    document.getElementById('commit-subject').textContent = c.subject || '';
    document.getElementById('commit-body').textContent = c.body || '';
    const author = document.getElementById('commit-author');
    clear(author);
    const short = c.short || (c.hash ? c.hash.slice(0, 7) : '');
    const rel = relativeAge(c.when_unix);
    const datePart = c.when || '';
    const dateLabel = rel ? datePart + ' (' + rel + ')' : datePart;
    // Author chip is colored by the per-author hue computed in Go.
    // Background uses the same hex at low alpha so the chip reads as
    // a tag without dominating the metadata line.
    const chip = el('span', { class: 'author-chip' }, c.author_name || '');
    if (c.author_color) {
      chip.style.color = c.author_color;
      chip.style.background = hexToRGBA(c.author_color, 0.15);
    }
    author.appendChild(chip);
    author.appendChild(document.createTextNode(' · ' + dateLabel + ' · '));
    author.appendChild(el('span', { class: 'badge ' + c.tag }, c.tag));
    author.appendChild(document.createTextNode(' · ' + short));
    // Sub-week gap → inline "5 days later" hint. Banner-tier gaps
    // are rendered separately in the gap-banner DOM block above.
    if (c.gap_tier === 'hint' && c.gap_ms > 0) {
      const days = Math.round(c.gap_ms / (1000 * 60 * 60 * 24));
      author.appendChild(el('span', { class: 'gap-hint' },
        '⏳ ' + days + ' day' + (days === 1 ? '' : 's') + ' later'));
    }
    // Banner block toggles based on tier.
    const banner = document.getElementById('gap-banner');
    const bText = document.getElementById('gap-banner-text');
    if (c.gap_tier === 'banner' && c.gap_ms > 0) {
      bText.textContent = humanGapLabel(c.gap_ms);
      banner.style.display = 'flex';
    } else {
      banner.style.display = 'none';
    }
  }

  // hexToRGBA turns "#rrggbb" into an rgba(...) string for the
  // author-chip background. Falls back to the input color on parse
  // failure so a bad palette entry doesn't blow up the renderer.
  function hexToRGBA(hex, alpha) {
    if (!hex || hex.length !== 7 || hex[0] !== '#') return hex;
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    if (Number.isNaN(r) || Number.isNaN(g) || Number.isNaN(b)) return hex;
    return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
  }

  // humanGapLabel mirrors Go's replay.GapLabel: pick the largest
  // unit that yields >= 1, single decimal removed.
  function humanGapLabel(gapMs) {
    const days = Math.floor(gapMs / (1000 * 60 * 60 * 24));
    if (days < 7) return days + ' day' + (days === 1 ? '' : 's') + ' later';
    if (days < 30) {
      const w = Math.floor(days / 7);
      return w + ' week' + (w === 1 ? '' : 's') + ' later';
    }
    if (days < 365) {
      const m = Math.floor(days / 30);
      return m + ' month' + (m === 1 ? '' : 's') + ' later';
    }
    const y = Math.floor(days / 365);
    return y + ' year' + (y === 1 ? '' : 's') + ' later';
  }

  function renderFileCard(f, anim) {
    const card = el('div', { class: 'file-card' + (anim.done ? ' done' : '') });
    const head = el('div', { class: 'file-head' }, [
      el('span', { class: 'check' }, anim.done ? '✓' : '▸'),
      el('span', { class: 'status' }, f.status),
      el('span', { class: 'path' }, f.path),
      el('span', { class: 'stats', style: 'color:var(--add)' }, '+' + f.added),
      el('span', { class: 'stats', style: 'color:var(--del)' }, ' -' + f.removed),
    ]);
    card.appendChild(head);

    const hunks = f.hunks || [];
    if (hunks.length) {
      const hi = Math.min(anim.hi, hunks.length - 1);
      const h = hunks[hi];
      const hunk = el('div', { class: 'hunk' });
      let shown = 0;
      for (let li = 0; li < h.lines.length; li++) {
        if (shown >= VISIBLE_LINES) break;
        if (!anim.done && li > anim.li) break;
        const l = h.lines[li];
        let text = l.t;
        let caret = null;
        if (!anim.done && li === anim.li && l.k === '+') {
          text = scrambleLine(text, anim.chars, scrambleSeed);
          caret = el('span', { class: 'caret' }, ' ');
        }
        const cls = l.k === '+' ? 'l add' : l.k === '-' ? 'l del' : 'l ctx';
        const prefix = l.k === '+' ? '+ ' : l.k === '-' ? '- ' : '  ';
        const row = el('div', { class: cls }, [prefix + text]);
        if (caret) row.appendChild(caret);
        hunk.appendChild(row);
        shown++;
      }
      card.appendChild(hunk);
    }

    const total = f.budget != null ? f.budget : MIN_FILE_BUDGET;
    const pct = Math.min(100, (consumedFor(f, anim) / total) * 100);
    card.appendChild(el('div', { class: 'progress' }, el('span', { style: 'width:' + pct + '%' })));
    return card;
  }

  function renderRight(c, anims) {
    renderCommitMeta(c);
    const filesEl = document.getElementById('files');
    clear(filesEl);
    if (!c.files.length) {
      filesEl.appendChild(el('div', { style: 'color:var(--dim)' }, '(no file changes in this commit)'));
      return;
    }
    for (let i = 0; i < c.files.length; i++) {
      filesEl.appendChild(renderFileCard(c.files[i], anims[i]));
    }
  }

  // Avoid redoing expensive DOM work when nothing visible has changed.
  // - The tree only changes when idx changes (snapshots are
  //   per-commit, so within a commit it stays static).
  // - The right pane only needs to update when idx changes OR when
  //   any per-file animation cursor advances.
  let lastIdxRendered = -1;
  let lastRightSig = '';
  // scrambleSeed advances on a clock independent of play/pause so the
  // noise keeps shimmering. When SCRAMBLE is off this stays 0 and
  // contributes a stable component to the render signature.
  let scrambleSeed = 0;

  function currentAnims(c) {
    const out = [];
    const mb = c.max_budget || MIN_FILE_BUDGET;
    const units = Math.floor(progress * mb);
    for (let i = 0; i < c.files.length; i++) {
      const fb = c.files[i].budget != null ? c.files[i].budget : MIN_FILE_BUDGET;
      const lb = Math.min(fb, units);
      out.push(applyFileAnim(c.files[i], lb));
    }
    return out;
  }

  function sigOf(anims) {
    let s = String(idx);
    for (const a of anims) {
      s += '|' + a.hi + ',' + a.li + ',' + a.chars + ',' + (a.done ? 1 : 0);
    }
    // Mix the seed in only when scramble is on; otherwise the cache
    // gating from before still works perfectly (no needless redraws
    // on every animation frame).
    if (SCRAMBLE) s += '!' + scrambleSeed;
    return s;
  }

  function render() {
    if (!commitCount) return;
    // commitAt forces the chunk for `idx` to be parsed if not yet
    // cached. The cost is bounded by chunkSize (≤100 commits' detail).
    const c = commitAt(idx);
    if (lastIdxRendered !== idx) {
      document.getElementById('counter').textContent = (idx + 1) + '/' + commitCount;
      document.getElementById('scrubber').value = String(idx);
      renderTree(snapshotAt(idx));
      updateCaret();
      updateHUD();
      lastIdxRendered = idx;
      lastRightSig = '';
    }
    const anims = currentAnims(c);
    const sig = sigOf(anims);
    if (sig !== lastRightSig) {
      renderRight(c, anims);
      lastRightSig = sig;
    }
  }

  // updateHUD writes the running-counters line. Cumulative
  // adds/removes come from the prefix sums; unique-files comes from
  // the snapshot's heat+ghost paths so we don't double-count
  // renames. Span uses the time bounds we already cached.
  function updateHUD() {
    const a = cumAdded[idx + 1];
    const r = cumRemoved[idx + 1];
    document.getElementById('hud-added').textContent = '+' + humanCount(a);
    document.getElementById('hud-removed').textContent = '-' + humanCount(r);
    const snap = snapshotAt(idx);
    const uniq = (snap.heat ? snap.heat.size : 0) + (snap.ghosts ? snap.ghosts.size : 0);
    document.getElementById('hud-files').textContent = uniq + ' file' + (uniq === 1 ? '' : 's');
    const s0 = summaries[0] || {};
    const sc = summaries[idx] || {};
    const span = document.getElementById('hud-span');
    if (s0.when_unix && sc.when_unix) {
      const days = Math.max(0, Math.floor((sc.when_unix - s0.when_unix) / 86400));
      span.textContent = (s0.when || '') + ' → ' + (sc.when || '') + ' · ' + humanSpanDays(days);
    } else {
      span.textContent = '';
    }
  }

  function humanCount(n) {
    if (n < 1000) return String(n);
    if (n < 1_000_000) return (n / 1000).toFixed(1) + 'K';
    return (n / 1_000_000).toFixed(1) + 'M';
  }

  function humanSpanDays(days) {
    if (days < 1) return 'today';
    if (days < 30) return days + 'd span';
    if (days < 365) return Math.floor(days / 30) + 'mo span';
    return (days / 365).toFixed(1) + 'y span';
  }

  function step(dt) {
    if (!playing) return;
    // Pacing only needs the summary's dwell_ms — no need to force a
    // chunk parse on every animation frame.
    const s = summaries[idx] || {};
    // dwell_ms is precomputed in Go (replay.DwellForWith with the
    // first-hunk visibility profile). The browser just turns the wall
    // clock into progress within the commit.
    const dwellSec = (s.dwell_ms || 0) / 1000;
    const dwell = dwellSec > 0 ? dwellSec : 1;
    progress += dt / dwell;
    if (progress >= 1) {
      progress = 0;
      if (idx < commitCount - 1) idx++;
      else playing = false;
    }
  }

  let last = performance.now();
  function loop(t) {
    const dt = (t - last) / 1000;
    last = t;
    step(dt);
    if (SCRAMBLE) scrambleSeed = Math.floor(t / SCRAMBLE_TICK_MS);
    render();
    // Progress bar advances continuously within a commit, independent
    // of the idx/anim signature gating in render(). Cheap DOM op.
    updateCommitProgress();
    requestAnimationFrame(loop);
  }

  document.getElementById('play').addEventListener('click', () => {
    playing = !playing;
    document.getElementById('play').textContent = playing ? '❚❚' : '▶';
  });
  document.getElementById('prev').addEventListener('click', () => {
    if (idx > 0) { idx--; progress = 0; }
  });
  document.getElementById('next').addEventListener('click', () => {
    if (idx < commitCount - 1) { idx++; progress = 0; }
  });
  document.getElementById('scrubber').addEventListener('input', (e) => {
    idx = parseInt(e.target.value, 10) || 0; progress = 0;
  });

  // Keyboard navigation: ←/→ step by 1 commit, Shift+←/→ by 10,
  // Home/End jump to ends, Space toggles play.
  window.addEventListener('keydown', (e) => {
    if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
    let step = 0;
    if (e.key === 'ArrowRight') step = e.shiftKey ? 10 : 1;
    else if (e.key === 'ArrowLeft') step = e.shiftKey ? -10 : -1;
    else if (e.key === 'Home') { idx = 0; progress = 0; e.preventDefault(); return; }
    else if (e.key === 'End') { idx = commitCount - 1; progress = 0; e.preventDefault(); return; }
    else if (e.key === ' ') {
      playing = !playing;
      document.getElementById('play').textContent = playing ? '❚❚' : '▶';
      e.preventDefault();
      return;
    } else { return; }
    idx = Math.max(0, Math.min(commitCount - 1, idx + step));
    progress = 0;
    e.preventDefault();
  });

  renderTimeline();
  updateCaret();
  render();
  // Hide the loading overlay only after the first paint, otherwise a
  // very tall timeline (thousands of segments) can still flash blank.
  requestAnimationFrame(function () {
    const loader = document.getElementById('loading');
    if (loader && loader.parentNode) loader.parentNode.removeChild(loader);
    requestAnimationFrame(loop);
  });
}

// Kick off after first paint so the loading overlay shows before any
// heavy work runs.
requestAnimationFrame(function () {
  requestAnimationFrame(bootGitfilm);
});
</script>
</body>
</html>
