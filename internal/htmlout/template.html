<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>gitplay — {{.Branch}}</title>
<style>
  :root {
    --bg: #0e1116;
    --fg: #e6edf3;
    --dim: #7d8590;
    --add: #56d364;
    --del: #f85149;
    --feat: #d2a8ff;
    --against: #79c0ff;
    --new: #f0c674;
    --panel: #161b22;
  }
  body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--fg);
    font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  header {
    padding: 10px 16px; border-bottom: 1px solid #21262d;
    display: flex; gap: 16px; align-items: baseline; flex-wrap: wrap;
  }
  header h1 { font-size: 14px; margin: 0; color: var(--feat); }
  header .meta { color: var(--dim); }
  main { display: grid; grid-template-columns: 360px 1fr; gap: 12px; padding: 12px; }
  .panel { background: var(--panel); border: 1px solid #21262d; border-radius: 6px; padding: 12px; min-height: 60vh; max-height: calc(100vh - 180px); overflow-y: auto; }
  .tree { font-size: 12px; }
  .tree .row { white-space: nowrap; display: flex; align-items: center; gap: 6px; }
  .tree .name { flex: 1; overflow: hidden; text-overflow: ellipsis; }
  .tree .heat { width: 60px; height: 8px; background: #30363d; border-radius: 2px; overflow: hidden; }
  .tree .heat span { display: block; height: 100%; background: var(--against); }
  .tree .deleted { color: var(--dim); text-decoration: line-through; }
  .tree .new { color: var(--new); }
  .tree .faint { color: var(--dim); opacity: 0.55; }
  .commit-card { background: #0d1117; border: 1px solid #21262d; border-radius: 6px; padding: 8px 12px; margin-bottom: 12px; }
  .commit-subject { font-size: 14px; color: var(--fg); margin: 0 0 4px; }
  .commit-author { color: var(--dim); font-size: 12px; }
  .commit-body { color: var(--dim); white-space: pre-wrap; font-size: 12px; margin-top: 6px; max-height: 64px; overflow-y: auto; }
  .files { display: grid; gap: 8px; }
  .file-card { background: #0d1117; border: 1px solid #21262d; border-radius: 4px; padding: 6px 10px; }
  .file-card .file-head { display: flex; gap: 8px; align-items: center; }
  .file-card .file-head .stats { color: var(--dim); margin-left: auto; }
  .file-card.done { opacity: 0.6; }
  .file-card.done .file-head .check { color: var(--add); }
  .file-card .progress { height: 2px; background: #21262d; border-radius: 1px; margin-top: 4px; overflow: hidden; }
  .file-card .progress span { display: block; height: 100%; background: var(--new); transition: width 80ms linear; }
  .file-card.done .progress span { background: var(--add); }
  .hunk { padding: 4px 0 0; overflow-x: auto; }
  .hunk .l { white-space: pre; font-size: 12px; }
  .hunk .l.add { color: var(--add); }
  .hunk .l.del { color: var(--del); }
  .hunk .l.ctx { color: var(--dim); }
  .caret { display: inline-block; width: 6px; background: var(--new); animation: blink 0.7s steps(2) infinite; }
  @keyframes blink { to { background: transparent; } }
  footer {
    position: sticky; bottom: 0; background: var(--bg);
    border-top: 1px solid #21262d; padding: 8px 16px;
  }
  .timeline-wrap { position: relative; height: 18px; }
  .timeline { display: flex; height: 12px; border-radius: 2px; overflow: hidden; position: absolute; left: 0; right: 0; top: 0; }
  .timeline span.seg { display: block; height: 100%; }
  .timeline span.seg.feat { background: var(--feat); }
  .timeline span.seg.against { background: var(--against); }
  .timeline-caret {
    position: absolute; top: 0; width: 2px; height: 18px;
    background: var(--new); transition: left 80ms linear;
    box-shadow: 0 0 6px var(--new);
  }
  .timeline-caret::after {
    content: '▼'; position: absolute; top: -10px; left: -5px;
    font-size: 10px; color: var(--new);
  }
  .controls { display: flex; gap: 8px; align-items: center; margin-top: 6px; color: var(--dim); }
  .controls button { background: #21262d; color: var(--fg); border: 0; padding: 4px 10px; border-radius: 3px; cursor: pointer; }
  .controls input[type=range] { flex: 1; }
  .badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 11px; }
  .badge.feat { background: rgba(210,168,255,.15); color: var(--feat); }
  .badge.against { background: rgba(121,192,255,.15); color: var(--against); }
</style>
</head>
<body>
<header>
  <h1>gitplay</h1>
  <span class="meta"><strong id="branch"></strong> ⇒ <span id="against"></span></span>
</header>
<main>
  <section class="panel tree" id="tree-panel"></section>
  <section class="panel right">
    <div class="commit-card">
      <h2 class="commit-subject" id="commit-subject"></h2>
      <div class="commit-author" id="commit-author"></div>
      <div class="commit-body" id="commit-body"></div>
    </div>
    <div class="files" id="files"></div>
  </section>
</main>
<footer>
  <div class="timeline-wrap">
    <div class="timeline" id="timeline"></div>
    <div class="timeline-caret" id="caret"></div>
  </div>
  <div class="controls">
    <button id="play">▶</button>
    <button id="prev">◀</button>
    <button id="next">▶|</button>
    <input type="range" id="scrubber" min="0" max="0" value="0" />
    <span id="counter"></span>
  </div>
</footer>

<script id="data" type="application/json">{{.Data}}</script>
<script>
(function () {
  const data = JSON.parse(document.getElementById('data').textContent);
  const commits = data.commits || [];
  document.getElementById('branch').textContent = data.branch || '';
  document.getElementById('against').textContent = data.against || '';

  // ---- DOM helpers (no innerHTML; builds elements via textContent) ----
  function el(tag, attrs, children) {
    const n = document.createElement(tag);
    if (attrs) {
      for (const k in attrs) {
        if (k === 'class') n.className = attrs[k];
        else if (k === 'style') n.setAttribute('style', attrs[k]);
        else n.setAttribute(k, attrs[k]);
      }
    }
    if (children != null) {
      const arr = Array.isArray(children) ? children : [children];
      for (const c of arr) {
        if (c == null) continue;
        if (typeof c === 'string') n.appendChild(document.createTextNode(c));
        else n.appendChild(c);
      }
    }
    return n;
  }
  function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }

  let idx = 0;
  let playing = true;
  let progress = 0; // 0..1 within current commit
  // Tuning values come from the Go side (internal/replay) so heat
  // decay, hidden/faint thresholds, and animation pacing stay in sync
  // between the TUI and HTML renderers.
  const T = data.tuning || {};
  const VISIBLE_LINES = T.visible_lines || 6;
  const LINE_COST = T.line_cost || 4;
  const MIN_FILE_BUDGET = T.min_file_budget || 8;
  const HIDDEN_BELOW = T.hidden_below || 0.005;
  const FAINT_BELOW = T.faint_below || 0.05;

  // Per-frame heat snapshots are precomputed in Go (parallel arrays)
  // and reconstituted into Maps/Sets here for fast lookup during
  // rendering. The browser never reimplements heat decay.
  const snapshots = commits.map((c) => {
    const s = c.snapshot || { paths: [], heat: [], touches: [], ghosts: [], added: [] };
    const heat = new Map();
    const touches = new Map();
    for (let i = 0; i < s.paths.length; i++) {
      heat.set(s.paths[i], s.heat[i]);
      touches.set(s.paths[i], s.touches[i]);
    }
    return { heat, touches, ghosts: new Set(s.ghosts), added: new Set(s.added) };
  });

  function heatColor(t) {
    if (t < 0.25) return 'var(--against)';
    if (t < 0.5) return '#f1e05a';
    if (t < 0.75) return '#f0c674';
    return 'var(--del)';
  }

  function renderTree(snap) {
    const panel = document.getElementById('tree-panel');
    clear(panel);
    const max = Math.max(0.0001, ...Array.from(snap.heat.values()));
    const root = { children: new Map(), files: [] };
    function ensure(parts) {
      let cur = root;
      for (const p of parts) {
        if (!cur.children.has(p)) cur.children.set(p, { children: new Map(), files: [] });
        cur = cur.children.get(p);
      }
      return cur;
    }
    const allPaths = new Set([...snap.heat.keys(), ...snap.ghosts]);
    for (const path of allPaths) {
      const parts = path.split('/');
      const dir = ensure(parts.slice(0, -1));
      if (snap.ghosts.has(path) && !snap.heat.has(path)) {
        dir.files.push({ name: parts[parts.length - 1], path, deleted: true });
        continue;
      }
      const heat = snap.heat.get(path) || 0;
      const ratio = heat / max;
      if (ratio < HIDDEN_BELOW) continue;
      dir.files.push({
        name: parts[parts.length - 1],
        path,
        heat,
        ratio,
        faint: ratio < FAINT_BELOW,
        touches: snap.touches.get(path) || 0,
        isNew: snap.added.has(path),
        deleted: false,
      });
    }
    // Recursively count visible descendants so we can prune empty dirs.
    function visibleCount(node) {
      let n = node.files.length;
      for (const sub of node.children.values()) n += visibleCount(sub);
      return n;
    }
    function walk(node, depth) {
      const dirs = Array.from(node.children.entries()).sort();
      for (const [name, sub] of dirs) {
        if (visibleCount(sub) === 0) continue;
        panel.appendChild(el('div', { class: 'row', style: 'padding-left:' + (depth * 12) + 'px' },
          el('span', { class: 'name' }, name + '/')));
        walk(sub, depth + 1);
      }
      const files = node.files.sort((a, b) => a.name.localeCompare(b.name));
      for (const f of files) {
        const cls = 'row ' + (f.deleted ? 'deleted' : (f.faint ? 'faint' : (f.isNew ? 'new' : '')));
        const marker = f.deleted ? '👻 ' : (f.isNew ? '✨ ' : '');
        const padding = 'padding-left:' + (depth * 12) + 'px';
        if (f.deleted || f.faint) {
          panel.appendChild(el('div', { class: cls, style: padding },
            el('span', { class: 'name' }, marker + f.name)));
          continue;
        }
        const heatPct = Math.round(f.ratio * 100);
        const heatBar = el('span', { class: 'heat' },
          el('span', { style: 'width:' + heatPct + '%; background:' + heatColor(f.ratio) }));
        const touches = el('span', { style: 'color:var(--dim); width:30px; text-align:right' }, '×' + (f.touches || 0));
        panel.appendChild(el('div', { class: cls, style: padding }, [
          el('span', { class: 'name' }, marker + f.name),
          heatBar,
          touches,
        ]));
      }
    }
    walk(root, 0);
  }

  function renderTimeline() {
    const tl = document.getElementById('timeline');
    clear(tl);
    if (!commits.length) return;
    let runStart = 0;
    for (let i = 1; i <= commits.length; i++) {
      if (i === commits.length || commits[i].tag !== commits[i - 1].tag) {
        const tag = commits[i - 1].tag;
        const w = ((i - runStart) / commits.length) * 100;
        tl.appendChild(el('span', { class: 'seg ' + tag, style: 'width:' + w + '%' }));
        runStart = i;
      }
    }
    document.getElementById('scrubber').max = String(commits.length - 1);
  }

  function updateCaret() {
    if (!commits.length) return;
    const pct = (idx / Math.max(1, commits.length - 1)) * 100;
    document.getElementById('caret').style.left = 'calc(' + pct + '% - 1px)';
  }

  // Per-file and per-commit budgets are precomputed in Go (under
  // FirstHunkProfile, mirroring exactly what this renderer shows). The
  // browser only advances the typing cursor; cost-of-line constants
  // (LINE_COST, VISIBLE_LINES) come from data.tuning so the algorithm
  // stays in lockstep with the Go side.
  function applyFileAnim(f, budget) {
    if (!f.hunks.length) return { hi: 0, li: 0, chars: -1, done: true };
    if (budget <= 0) return { hi: 0, li: 0, chars: 0, done: false };
    const h = f.hunks[0];
    const n = Math.min(VISIBLE_LINES, h.lines.length);
    let rem = budget;
    for (let li = 0; li < n; li++) {
      const l = h.lines[li];
      if (l.k === '+') {
        const len = l.t.length;
        if (rem < len) return { hi: 0, li, chars: rem, done: false };
        rem -= len;
      } else {
        if (rem < LINE_COST) return { hi: 0, li, chars: 0, done: false };
        rem -= LINE_COST;
      }
    }
    return { hi: 0, li: 0, chars: -1, done: true };
  }

  function consumedFor(f, anim) {
    const budget = f.budget != null ? f.budget : MIN_FILE_BUDGET;
    if (anim.done || !f.hunks.length) return budget;
    const h = f.hunks[0];
    const n = Math.min(VISIBLE_LINES, h.lines.length);
    let consumed = 0;
    for (let li = 0; li < n; li++) {
      if (li > anim.li) break;
      const l = h.lines[li];
      if (li === anim.li) {
        consumed += l.k === '+' ? anim.chars : 0;
        break;
      }
      consumed += l.k === '+' ? l.t.length : LINE_COST;
    }
    return consumed;
  }

  // relativeAge formats a unix timestamp as "5 days ago", "2 years ago",
  // etc. Picks the largest unit that yields >= 1, with no decimals so
  // it stays glanceable. Falls back to "" if when_unix is missing.
  function relativeAge(unix) {
    if (!unix) return '';
    const diffMs = Date.now() - unix * 1000;
    const sec = Math.round(diffMs / 1000);
    if (sec < 0) return 'in the future';
    const units = [
      [60, 'second'],
      [60, 'minute'],
      [24, 'hour'],
      [7, 'day'],
      [4.345, 'week'],
      [12, 'month'],
      [Number.POSITIVE_INFINITY, 'year'],
    ];
    let n = sec;
    for (let i = 0; i < units.length; i++) {
      const [factor, label] = units[i];
      if (n < factor) return n + ' ' + label + (n === 1 ? '' : 's') + ' ago';
      n = Math.floor(n / factor);
    }
    return n + ' years ago';
  }

  function renderCommitMeta(c) {
    document.getElementById('commit-subject').textContent = c.subject || '';
    document.getElementById('commit-body').textContent = c.body || '';
    const author = document.getElementById('commit-author');
    clear(author);
    const short = c.short || (c.hash ? c.hash.slice(0, 7) : '');
    const rel = relativeAge(c.when_unix);
    const datePart = c.when || '';
    const dateLabel = rel ? datePart + ' (' + rel + ')' : datePart;
    author.appendChild(document.createTextNode((c.author_name || '') + ' · ' + dateLabel + ' · '));
    author.appendChild(el('span', { class: 'badge ' + c.tag }, c.tag));
    author.appendChild(document.createTextNode(' · ' + short));
  }

  function renderFileCard(f, anim) {
    const card = el('div', { class: 'file-card' + (anim.done ? ' done' : '') });
    const head = el('div', { class: 'file-head' }, [
      el('span', { class: 'check' }, anim.done ? '✓' : '▸'),
      el('span', { class: 'status' }, f.status),
      el('span', { class: 'path' }, f.path),
      el('span', { class: 'stats', style: 'color:var(--add)' }, '+' + f.added),
      el('span', { class: 'stats', style: 'color:var(--del)' }, ' -' + f.removed),
    ]);
    card.appendChild(head);

    if (f.hunks.length) {
      const hi = Math.min(anim.hi, f.hunks.length - 1);
      const h = f.hunks[hi];
      const hunk = el('div', { class: 'hunk' });
      let shown = 0;
      for (let li = 0; li < h.lines.length; li++) {
        if (shown >= VISIBLE_LINES) break;
        if (!anim.done && li > anim.li) break;
        const l = h.lines[li];
        let text = l.t;
        let caret = null;
        if (!anim.done && li === anim.li && l.k === '+') {
          text = text.slice(0, anim.chars);
          caret = el('span', { class: 'caret' }, ' ');
        }
        const cls = l.k === '+' ? 'l add' : l.k === '-' ? 'l del' : 'l ctx';
        const prefix = l.k === '+' ? '+ ' : l.k === '-' ? '- ' : '  ';
        const row = el('div', { class: cls }, [prefix + text]);
        if (caret) row.appendChild(caret);
        hunk.appendChild(row);
        shown++;
      }
      card.appendChild(hunk);
    }

    const total = f.budget != null ? f.budget : MIN_FILE_BUDGET;
    const pct = Math.min(100, (consumedFor(f, anim) / total) * 100);
    card.appendChild(el('div', { class: 'progress' }, el('span', { style: 'width:' + pct + '%' })));
    return card;
  }

  function renderRight(c, anims) {
    renderCommitMeta(c);
    const filesEl = document.getElementById('files');
    clear(filesEl);
    if (!c.files.length) {
      filesEl.appendChild(el('div', { style: 'color:var(--dim)' }, '(no file changes in this commit)'));
      return;
    }
    for (let i = 0; i < c.files.length; i++) {
      filesEl.appendChild(renderFileCard(c.files[i], anims[i]));
    }
  }

  // Avoid redoing expensive DOM work when nothing visible has changed.
  // - The tree only changes when idx changes (snapshots are
  //   per-commit, so within a commit it stays static).
  // - The right pane only needs to update when idx changes OR when
  //   any per-file animation cursor advances.
  let lastIdxRendered = -1;
  let lastRightSig = '';

  function currentAnims(c) {
    const out = [];
    for (let i = 0; i < c.files.length; i++) {
      const fb = c.files[i].budget != null ? c.files[i].budget : MIN_FILE_BUDGET;
      const lb = Math.min(fb, Math.floor(progress * fb));
      out.push(applyFileAnim(c.files[i], lb));
    }
    return out;
  }

  function sigOf(anims) {
    let s = String(idx);
    for (const a of anims) {
      s += '|' + a.hi + ',' + a.li + ',' + a.chars + ',' + (a.done ? 1 : 0);
    }
    return s;
  }

  function render() {
    if (!commits.length) return;
    const c = commits[idx];
    if (lastIdxRendered !== idx) {
      document.getElementById('counter').textContent = (idx + 1) + '/' + commits.length;
      document.getElementById('scrubber').value = String(idx);
      renderTree(snapshots[idx]);
      updateCaret();
      lastIdxRendered = idx;
      lastRightSig = '';
    }
    const anims = currentAnims(c);
    const sig = sigOf(anims);
    if (sig !== lastRightSig) {
      renderRight(c, anims);
      lastRightSig = sig;
    }
  }

  function step(dt) {
    if (!playing) return;
    const c = commits[idx];
    // dwell_ms is precomputed in Go (replay.DwellForWith with the
    // first-hunk visibility profile). The browser just turns the wall
    // clock into progress within the commit.
    const dwellSec = (c.dwell_ms || 0) / 1000;
    const dwell = dwellSec > 0 ? dwellSec : 1;
    progress += dt / dwell;
    if (progress >= 1) {
      progress = 0;
      if (idx < commits.length - 1) idx++;
      else playing = false;
    }
  }

  let last = performance.now();
  function loop(t) {
    const dt = (t - last) / 1000;
    last = t;
    step(dt);
    render();
    requestAnimationFrame(loop);
  }

  document.getElementById('play').addEventListener('click', () => {
    playing = !playing;
    document.getElementById('play').textContent = playing ? '❚❚' : '▶';
  });
  document.getElementById('prev').addEventListener('click', () => {
    if (idx > 0) { idx--; progress = 0; }
  });
  document.getElementById('next').addEventListener('click', () => {
    if (idx < commits.length - 1) { idx++; progress = 0; }
  });
  document.getElementById('scrubber').addEventListener('input', (e) => {
    idx = parseInt(e.target.value, 10) || 0; progress = 0;
  });

  // Keyboard navigation: ←/→ step by 1 commit, Shift+←/→ by 10,
  // Home/End jump to ends, Space toggles play.
  window.addEventListener('keydown', (e) => {
    if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
    let step = 0;
    if (e.key === 'ArrowRight') step = e.shiftKey ? 10 : 1;
    else if (e.key === 'ArrowLeft') step = e.shiftKey ? -10 : -1;
    else if (e.key === 'Home') { idx = 0; progress = 0; e.preventDefault(); return; }
    else if (e.key === 'End') { idx = commits.length - 1; progress = 0; e.preventDefault(); return; }
    else if (e.key === ' ') {
      playing = !playing;
      document.getElementById('play').textContent = playing ? '❚❚' : '▶';
      e.preventDefault();
      return;
    } else { return; }
    idx = Math.max(0, Math.min(commits.length - 1, idx + step));
    progress = 0;
    e.preventDefault();
  });

  renderTimeline();
  updateCaret();
  render();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
